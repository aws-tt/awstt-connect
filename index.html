<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect with AWS Torque & Tension</title>
    <!-- Google Fonts for Industrial/Modern Tech Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Clean Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #12161a;
            --card-bg: rgba(26, 32, 39, 0.85);
            --border-color: #2a343f;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-orange: #ff6b00; /* Industrial Safety Orange */
            --accent-blue: #00e5ff;   /* Precision Calibration Cyan */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Industrial Grid/Machinery Background Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* High-quality industrial texture placeholder */
            background: linear-gradient(135deg, rgba(18, 22, 26, 0.95) 30%, rgba(18, 22, 26, 0.8) 100%), 
                        url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=1200') no-repeat center center/cover;
            z-index: -2;
        }

        /* Subtle Technical Grid Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 520px;
            text-align: center;
        }

        /* Logo Styling */
        .logo-container {
            margin-bottom: 25px;
        }

        .logo-container img {
            max-width: 240px;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        /* Profile/Intro Card */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--accent-orange); /* Heavy duty top border */
            border-radius: 12px;
            padding: 30px 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .profile-card h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .profile-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Technical Badge */
        .badge {
            display: inline-block;
            font-family: 'Chivo Mono', monospace;
            font-size: 0.75rem;
            background: rgba(255, 107, 0, 0.1);
            color: var(--accent-orange);
            border: 1px solid rgba(255, 107, 0, 0.3);
            padding: 4px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 15px;
        }

        /* Links / Buttons Stack */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .connect-btn {
            display: flex;
            align-items: center;
            background: rgba(38, 48, 60, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            text-decoration: none;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .connect-btn i {
            font-size: 1.25rem;
            width: 35px;
            text-align: left;
            color: var(--accent-orange);
            transition: transform 0.25s ease;
        }

        /* Button Hover Effects */
        .connect-btn:hover {
            background: rgba(255, 107, 0, 0.1);
            border-color: var(--accent-orange);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 0, 0.15);
        }

        .connect-btn:hover i {
            transform: scale(1.15);
        }

        /* Highlighted Primary Link (Main Website) */
        .connect-btn.primary-btn {
            background: linear-gradient(135deg, #ff6b00 0%, #e05e00 100%);
            border: none;
            color: #ffffff;
        }
        
        .connect-btn.primary-btn i {
            color: #ffffff;
        }

        .connect-btn.primary-btn:hover {
            background: linear-gradient(135deg, #ff7c1f 0%, #f56700 100%);
            box-shadow: 0 8px 20px rgba(255, 107, 0, 0.4);
        }

        /* Footer / Verification Note */
        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'Chivo Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer i {
            color: var(--accent-orange);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Logo Section (Relative link fetching from GitHub workspace root) -->
        <div class="logo-container">
            <img src="logo.png" alt="AWS Torque & Tension Logo">
        </div>

        <!-- Main Connect Profile Card -->
        <div class="profile-card">
            <div class="badge"><i class="fa-solid fa-gears"></i> NIST Traceable Calibration</div>
            <h1>AWS Torque & Tension</h1>
            <p>Precision calibration solutions for torque testers, wrenches, tension, pressure, and load instrumentation.</p>
            
            <!-- Links List -->
            <div class="links-stack">
                
                <!-- Main Website -->
                <a href="https://awstorqueandtension.com" target="_blank" class="connect-btn primary-btn">
                    <i class="fa-solid fa-globe"></i>
                    <span>Visit Our Main Website</span>
                </a>

                <!-- Phone -->
                <a href="tel:6828041148" class="connect-btn">
                    <i class="fa-solid fa-phone-volume"></i>
                    <span>Call 682-804-1148</span>
                </a>

                <!-- Email -->
                <a href="mailto:alex@awstorqueandtension.com" class="connect-btn">
                    <i class="fa-solid fa-envelope-open-text"></i>
                    <span>alex@awstorqueandtension.com</span>
                </a>

                <!-- Facebook -->
                <a href="https://www.facebook.com/share/18WX9QU6y2/" target="_blank" class="connect-btn">
                    <i class="fa-brands fa-facebook-f"></i>
                    <span>Follow Us on Facebook</span>
                </a>

            </div>
        </div>

        <!-- Footnote / Industrial Metadata -->
        <div class="footer">
            <p><i class="fa-solid fa-shield-halved"></i> Accuracy • Reliability • Torque Authority</p>
        </div>

    </div>

</body>
</html>
